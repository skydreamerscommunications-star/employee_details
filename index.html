<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Employee Information Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}body{margin:0;font-family:Inter,sans-serif;background:#eef3fb;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
.card{width:min(820px,100%);background:#fff;border-radius:26px;padding:40px 42px;box-shadow:0 20px 60px rgba(31,73,125,.12)}
.logo{width:72px;height:72px;margin:0 auto 18px;border-radius:18px;background:linear-gradient(135deg,#2f6df5,#5b95ff);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:30px;letter-spacing:-1px}
h1{margin:0;text-align:center;font-size:32px;color:#22314d}
.sub{margin:10px 0 30px;text-align:center;color:#68768f;font-size:15px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.field{margin-bottom:18px}
label{display:block;margin-bottom:8px;font-size:15px;font-weight:600;color:#34435e}
input,select{width:100%;height:48px;border:1px solid #d8e2f2;border-radius:14px;padding:0 16px;font-size:16px;outline:none}
input:focus,select:focus{border-color:#3f7cff;box-shadow:0 0 0 4px rgba(63,124,255,.12)}
button{width:100%;margin-top:8px;height:54px;border:none;border-radius:16px;background:linear-gradient(90deg,#2f6df5,#3678f6);color:#fff;font-size:18px;font-weight:700;cursor:pointer}
@media(max-width:700px){.card{padding:28px}.grid2{grid-template-columns:1fr}h1{font-size:28px}}
</style>
</head>
<body>
<div class="card">
<div class="logo">SDC</div>
<h1>Employee Information Portal</h1>
<div class="sub">Please complete your banking information accurately.</div>

<div class="field">
<label>Employee Name</label>
<input type="text" placeholder="Enter your full name">
</div>

<div class="grid2">
<div class="field">
<label>Phone Number</label>
<input id="phone" maxlength="12" placeholder="0320-1234567">
</div>
<div class="field">
<label>CNIC</label>
<input id="cnic" maxlength="15" placeholder="37406-0756843-5">
</div>
</div>

<div class="field">
<label>Account Holder Name</label>
<input type="text" placeholder="As printed on bank account">
</div>

<div class="grid2">
<div class="field">
<label>Bank Name</label>
<select>
<option>Select Bank</option>
<option>Bank Alfalah</option>
<option>HBL</option>
<option>UBL</option>
<option>MCB</option>
<option>Allied Bank</option>
<option>Meezan Bank</option>
<option>Askari Bank</option>
<option>Bank Al Habib</option>
<option>BankIslami</option>
<option>Faysal Bank</option>
</select>
</div>
<div class="field">
<label>Account Number</label>
<input type="text">
</div>
</div>

<div class="field">
<label>IBAN</label>
<input type="text" placeholder="PK17ALFH0008001008952877">
</div>

<button>Submit Information</button>
</div>

<script>
function formatPhone(v){
 let d=v.replace(/\D/g,'').slice(0,11);
 if(d.length>4)d=d.slice(0,4)+"-"+d.slice(4);
 return d;
}
function formatCNIC(v){
 let d=v.replace(/\D/g,'').slice(0,13);
 if(d.length<=5)return d;
 if(d.length<=12)return d.slice(0,5)+"-"+d.slice(5);
 return d.slice(0,5)+"-"+d.slice(5,12)+"-"+d.slice(12);
}
phone.addEventListener("input",e=>e.target.value=formatPhone(e.target.value));
cnic.addEventListener("input",e=>e.target.value=formatCNIC(e.target.value));
</script>
</body>
</html>
